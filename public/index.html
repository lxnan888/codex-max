<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Codex Max</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0d0d;
      --topbar-bg: #000;
      --panel: #171717;
      --line: rgba(255,255,255,.09);
      --line-strong: rgba(255,255,255,.18);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --soft: #d4d4d8;
      --faint: #71717a;
      --user: #2f2f2f;
      --accent: #f4f4f5;
      --ok: #8ef0b7;
      --danger: #ff8d8d;
      --warning: #ffd68a;
      --blue: #9ecbff;
      --topbar-row-height: 52px;
      --composer-bottom-pad: max(18px, calc(env(safe-area-inset-bottom) + 18px));
      --thread-composer-gap: 8px;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--topbar-bg);
      overscroll-behavior: none;
    }
    body {
      position: fixed;
      inset: 0;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, textarea, select { font: inherit; letter-spacing: 0; }
    button { color: inherit; }
    .app {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr;
      background: var(--bg);
      overflow: hidden;
    }
    .sidebar {
      position: fixed;
      z-index: 100;
      left: 10px;
      top: calc(env(safe-area-inset-top) + 10px);
      bottom: 10px;
      width: min(360px, calc(100vw - 20px));
      border: 1px solid var(--line-strong);
      border-radius: 24px;
      background: rgba(18,18,18,.94);
      box-shadow: 0 24px 70px rgba(0,0,0,.46);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      min-width: 0;
      transform: translateX(calc(-100% - 24px));
      transition: transform .2s ease;
      overflow: hidden;
    }
    body.menu-open .sidebar { transform: translateX(0); }
    .brand {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }
    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 780;
    }
    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .status-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .status-pill {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 0 11px;
      border: 1px solid rgba(142,240,183,.24);
      border-radius: 999px;
      background: rgba(142,240,183,.10);
      color: var(--ok);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warning);
      flex: 0 0 auto;
      box-shadow: 0 0 16px currentColor;
    }
    .dot.is-ok { background: var(--ok); }
    .dot.is-bad { background: var(--danger); }
    .icon-btn, .text-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.055);
      border-radius: 999px;
      height: 34px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .icon-btn { width: 34px; padding: 0; }
    .text-btn {
      padding: 0 10px;
      color: var(--soft);
      font-size: 12px;
      white-space: nowrap;
    }
    .icon-btn:hover, .text-btn:hover { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.18); }
    .icon-btn:active, .text-btn:active { transform: scale(.96); }
    .icon-btn:disabled, .text-btn:disabled { opacity: .45; cursor: default; }
    .icon-btn svg, .text-btn svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .thread-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }
    .thread-item {
      width: 100%;
      min-height: 54px;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      padding: 10px 12px;
      display: grid;
      gap: 2px;
    }
    .thread-item:hover { background: rgba(255,255,255,.055); }
    .thread-item.is-current {
      background: rgba(142,240,183,.10);
      border-color: rgba(142,240,183,.20);
    }
    .thread-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 720;
      font-size: 13px;
    }
    .thread-meta {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .main {
      min-width: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }
    .topbar {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: calc(var(--topbar-row-height) + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 14px 0;
      border-bottom: 1px solid rgba(255,255,255,.22);
      background: var(--topbar-bg);
      -webkit-user-select: none;
      user-select: none;
    }
    .current-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .current-title strong {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 16px;
      font-weight: 780;
    }
    .current-title span {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .select-wrap { position: relative; }
    .select-wrap select {
      height: 34px;
      max-width: 150px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      background: rgba(255,255,255,.055);
      color: var(--muted);
      padding: 0 26px 0 10px;
      outline: none;
      font-size: 12px;
      font-weight: 760;
    }
    .chat {
      min-height: 0;
      overflow: auto;
      padding: 22px max(14px, calc((100vw - 860px) / 2)) var(--thread-composer-gap);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overscroll-behavior: contain;
    }
    .empty {
      margin: auto;
      color: var(--muted);
      text-align: center;
      max-width: 420px;
    }
    .message {
      display: grid;
      gap: 6px;
      max-width: min(760px, 88%);
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .message .meta {
      color: var(--muted);
      font-size: 11px;
      padding: 0 2px;
    }
    .bubble {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 0;
      border-radius: 22px;
      padding: 11px 14px;
      background: transparent;
      line-height: 1.55;
    }
    .user .bubble {
      background: var(--user);
      color: var(--text);
    }
    .assistant.pending .bubble { color: rgba(244,244,245,.82); }
    .notice {
      position: fixed;
      left: 50%;
      top: calc(env(safe-area-inset-top) + var(--topbar-row-height) + 8px);
      transform: translate(-50%, -8px) scale(.98);
      max-width: min(680px, calc(100vw - 32px));
      padding: 0 12px;
      border: 1px solid rgba(142,240,183,.22);
      border-radius: 999px;
      background: rgba(16, 38, 27, .78);
      color: var(--ok);
      box-shadow: 0 10px 34px rgba(0,0,0,.22);
      line-height: 28px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 120;
    }
    .notice.is-open { opacity: 1; transform: translate(-50%, 0) scale(1); }
    .notice.is-error {
      border-color: rgba(255,141,141,.24);
      background: rgba(54, 24, 24, .82);
      color: var(--danger);
    }
    .composer-wrap {
      padding: 0 max(12px, calc((100vw - 860px) / 2)) var(--composer-bottom-pad);
      background: linear-gradient(to top, var(--bg) 76%, rgba(13,13,13,0));
    }
    .composer {
      position: relative;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 5px;
      align-items: end;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #202020;
      box-shadow: 0 16px 42px rgba(0,0,0,.24);
    }
    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .attach {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      color: var(--soft);
      align-self: end;
    }
    .attachment-tray {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 1px 2px 3px;
      min-width: 0;
    }
    .attachment-tray[hidden] { display: none; }
    .attachment-pill {
      max-width: min(260px, 100%);
      min-height: 30px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      background: rgba(255,255,255,.055);
      color: var(--soft);
      display: inline-grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
      padding: 3px 5px 3px 10px;
      font-size: 12px;
    }
    .attachment-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .attachment-remove {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .attachment-remove:hover { background: rgba(255,255,255,.08); color: var(--text); }
    textarea {
      width: 100%;
      min-height: 38px;
      max-height: 150px;
      resize: none;
      outline: none;
      border: 0;
      border-radius: 18px;
      background: transparent;
      color: var(--text);
      padding: 8px 8px;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
    }
    textarea::placeholder { color: var(--faint); }
    .send {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #111;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform .12s ease, opacity .12s ease;
    }
    .send:active { transform: scale(.96); }
    .send.is-stop { background: var(--danger); color: #240b0b; }
    .send:disabled { opacity: .45; cursor: default; }
    .send svg, .attach svg, .attachment-remove svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @media (min-width: 980px) {
      .sidebar {
        left: 18px;
        top: calc(env(safe-area-inset-top) + 18px);
        bottom: 18px;
      }
      .chat {
        padding-left: max(18px, calc((100vw - 940px) / 2));
        padding-right: max(18px, calc((100vw - 940px) / 2));
      }
      .composer-wrap {
        padding-left: max(18px, calc((100vw - 940px) / 2));
        padding-right: max(18px, calc((100vw - 940px) / 2));
      }
    }
    @media (max-width: 780px) {
      :root { --topbar-row-height: 46px; --composer-bottom-pad: max(16px, calc(env(safe-area-inset-bottom) + 16px)); }
      .topbar {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        padding-left: 12px;
        padding-right: 12px;
      }
      .topbar .toolbar {
        grid-column: 1 / -1;
        justify-content: flex-start;
        gap: 6px;
        padding-bottom: 8px;
      }
      .text-btn { height: 30px; padding-inline: 9px; font-size: 11px; }
      .icon-btn { width: 32px; height: 32px; }
      .select-wrap select { height: 30px; max-width: 128px; font-size: 11px; }
      .chat { padding: 18px 12px var(--thread-composer-gap); }
      .message { max-width: 92%; }
      .message.assistant { max-width: 100%; }
      .bubble { font-size: 15px; }
      .composer-wrap { padding-left: 12px; padding-right: 12px; }
      .composer { border-radius: 29px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>Codex Max</h1>
        <p>VSCode Codex 本地控制器</p>
      </div>
      <div class="status-row">
        <div class="status-pill" title="当前控制目标">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">VSCode Codex · 检查中</span>
        </div>
        <button class="icon-btn" id="refresh" type="button" title="刷新">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"></path><path d="M3 12A9 9 0 0 1 18.5 5.8"></path><path d="M18 2v4h4"></path><path d="M6 22v-4H2"></path></svg>
        </button>
      </div>
      <div class="thread-list" id="thread-list"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn" id="menu" type="button" title="会话列表">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path></svg>
        </button>
        <div class="current-title">
          <strong id="current-title">当前会话</strong>
          <span id="current-subtitle">VSCode Codex · CDP</span>
        </div>
        <div class="toolbar">
          <button class="text-btn" id="new-thread" type="button" title="新建会话">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            <span>新会话</span>
          </button>
          <div class="select-wrap">
            <select id="model-select" title="切换模型"></select>
          </div>
          <div class="select-wrap">
            <select id="reasoning-select" title="切换推理强度">
              <option value="low">低</option>
              <option value="medium" selected>中</option>
              <option value="high">高</option>
              <option value="xhigh">超高</option>
            </select>
          </div>
        </div>
      </header>

      <section class="chat" id="chat" aria-label="聊天记录">
        <div class="empty" id="empty">从启动器启动 VSCode 后，这里会同步当前 VSCode Codex GUI 的会话内容。</div>
      </section>

      <footer class="composer-wrap">
        <form class="composer" id="composer">
          <div class="attachment-tray" id="attachment-tray" hidden></div>
          <input class="file-input" id="file-input" type="file" multiple />
          <button class="icon-btn attach" id="attach" type="button" title="添加附件">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
          </button>
          <textarea id="text" rows="1" placeholder="发送消息到 VSCode Codex"></textarea>
          <button class="send" id="send" type="submit" title="发送">
            <svg id="send-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>
          </button>
        </form>
      </footer>
    </main>
  </div>
  <div class="notice" id="notice" role="status" aria-live="polite"></div>

  <script>
    const $ = id => document.getElementById(id);
    const els = {
      sidebar: $('sidebar'),
      menu: $('menu'),
      refresh: $('refresh'),
      statusDot: $('status-dot'),
      statusText: $('status-text'),
      threadList: $('thread-list'),
      currentTitle: $('current-title'),
      currentSubtitle: $('current-subtitle'),
      newThread: $('new-thread'),
      modelSelect: $('model-select'),
      reasoningSelect: $('reasoning-select'),
      chat: $('chat'),
      empty: $('empty'),
      composer: $('composer'),
      fileInput: $('file-input'),
      attach: $('attach'),
      attachmentTray: $('attachment-tray'),
      textarea: $('text'),
      send: $('send'),
      sendIcon: $('send-icon'),
      notice: $('notice'),
    };

    const state = {
      controlMode: 'unavailable',
      threads: [],
      selectedThreadId: localStorage.getItem('codexMax.selectedThread') || '',
      activeAssistant: null,
      activeWatch: null,
      pollTimer: null,
      latestSignature: '',
      currentSignature: '',
      modelOptions: [],
      attachments: [],
      busy: false,
    };

    const attachmentLimits = {
      maxCount: 6,
      maxFileBytes: 10 * 1024 * 1024,
      maxTotalBytes: 25 * 1024 * 1024,
    };

    const icons = {
      send: '<path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path>',
      stop: '<rect x="7" y="7" width="10" height="10" rx="1.5"></rect>',
    };

    function api(path, options = {}) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), options.timeout || 30000);
      const request = { ...options, signal: controller.signal };
      delete request.timeout;
      return fetch(path, request).finally(() => clearTimeout(timer));
    }

    async function apiJson(path, options = {}) {
      const response = await api(path, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) throw new Error(data.message || data.code || '请求失败');
      return data;
    }

    function showNotice(message, type = 'ok') {
      els.notice.textContent = message || '';
      els.notice.classList.toggle('is-error', type === 'error');
      els.notice.classList.add('is-open');
      clearTimeout(showNotice.timer);
      showNotice.timer = setTimeout(() => els.notice.classList.remove('is-open'), 2600);
    }

    function formatBytes(bytes) {
      const value = Number(bytes) || 0;
      if (value >= 1024 * 1024) return `${(value / 1024 / 1024).toFixed(value >= 10 * 1024 * 1024 ? 0 : 1)}MB`;
      if (value >= 1024) return `${Math.round(value / 1024)}KB`;
      return `${value}B`;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const value = String(reader.result || '');
          const comma = value.indexOf(',');
          resolve(comma >= 0 ? value.slice(comma + 1) : value);
        };
        reader.onerror = () => reject(reader.error || new Error('读取附件失败'));
        reader.readAsDataURL(file);
      });
    }

    function attachmentTotal(extra = 0) {
      return state.attachments.reduce((sum, item) => sum + Number(item.size || 0), 0) + extra;
    }

    function renderAttachments() {
      els.attachmentTray.textContent = '';
      els.attachmentTray.hidden = state.attachments.length === 0;
      state.attachments.forEach((item, index) => {
        const pill = document.createElement('div');
        pill.className = 'attachment-pill';
        const name = document.createElement('span');
        name.className = 'attachment-name';
        name.textContent = `${item.name} · ${formatBytes(item.size)}`;
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'attachment-remove';
        remove.title = '移除附件';
        remove.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>';
        remove.addEventListener('click', () => {
          state.attachments.splice(index, 1);
          renderAttachments();
        });
        pill.append(name, remove);
        els.attachmentTray.appendChild(pill);
      });
    }

    function clearAttachments() {
      state.attachments = [];
      renderAttachments();
    }

    async function addFiles(files) {
      const incoming = [...(files || [])];
      if (!incoming.length) return;
      if (state.attachments.length + incoming.length > attachmentLimits.maxCount) {
        showNotice(`一次最多添加 ${attachmentLimits.maxCount} 个附件。`, 'error');
        return;
      }
      for (const file of incoming) {
        if (file.size > attachmentLimits.maxFileBytes) {
          showNotice(`单个附件不能超过 ${formatBytes(attachmentLimits.maxFileBytes)}。`, 'error');
          return;
        }
        if (attachmentTotal(file.size) > attachmentLimits.maxTotalBytes) {
          showNotice(`单次附件总大小不能超过 ${formatBytes(attachmentLimits.maxTotalBytes)}。`, 'error');
          return;
        }
        const base64 = await fileToBase64(file);
        state.attachments.push({
          name: file.name || 'attachment',
          type: file.type || 'application/octet-stream',
          size: file.size,
          base64,
        });
      }
      renderAttachments();
    }

    function threadTitle(item) {
      return item?.name || item?.title || item?.id || '未命名会话';
    }

    function currentThread() {
      return state.threads.find(item => item.id === state.selectedThreadId) || null;
    }

    function isSelectableThreadId(threadId) {
      return /^gui:title:[a-z0-9]+(?::dup\d+)?$/i.test(String(threadId || ''));
    }

    function selectedGuiThreadId() {
      return isSelectableThreadId(state.selectedThreadId) && state.threads.some(item => item.id === state.selectedThreadId)
        ? state.selectedThreadId
        : '';
    }

    function setSelectedThreadId(threadId) {
      state.selectedThreadId = threadId || '';
      if (state.selectedThreadId) localStorage.setItem('codexMax.selectedThread', state.selectedThreadId);
      else localStorage.removeItem('codexMax.selectedThread');
    }

    function statusSignature(data) {
      if (!data || !data.available) return '';
      const last = Array.isArray(data.messages) ? data.messages.slice(-3).map(item => `${item.role}:${item.text}`).join('|') : '';
      return [data.threadId || '', data.title || '', data.status || '', data.preview || '', data.final || '', last].join('|');
    }

    function setStatus(mode) {
      state.controlMode = mode || state.controlMode;
      const ok = state.controlMode === 'cdp';
      els.statusDot.className = `dot ${ok ? 'is-ok' : 'is-bad'}`;
      els.statusText.textContent = `VSCode Codex · ${ok ? 'CDP' : '不可用'}`;
      els.currentSubtitle.textContent = ok ? 'VSCode Codex · CDP · GUI 实时同步' : 'VSCode Codex · CDP 不可用';
    }

    function setRunning(running) {
      els.send.classList.toggle('is-stop', running);
      els.send.title = running ? '停止' : '发送';
      els.sendIcon.innerHTML = running ? icons.stop : icons.send;
    }

    function setBusy(busy) {
      state.busy = busy;
      els.newThread.disabled = busy;
      els.attach.disabled = busy;
      els.send.disabled = busy && !state.activeAssistant;
      els.modelSelect.disabled = busy;
      els.reasoningSelect.disabled = busy;
    }

    function clearChat() {
      [...els.chat.querySelectorAll('.message')].forEach(node => node.remove());
      els.empty.hidden = false;
    }

    function addMessage(role, text, options = {}) {
      els.empty.hidden = true;
      const wrap = document.createElement('article');
      wrap.className = `message ${role}${options.pending ? ' pending' : ''}`;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = options.label || (role === 'user' ? '你' : 'Codex');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text || '';
      wrap.append(meta, bubble);
      els.chat.appendChild(wrap);
      els.chat.scrollTop = els.chat.scrollHeight;
      return { wrap, meta, bubble };
    }

    function renderMessages(messages = []) {
      clearChat();
      if (!messages.length) {
        addMessage('assistant', '请选择左侧会话，WebUI 会同步切换 VSCode Codex。', { label: 'Codex Max' });
        return;
      }
      for (const row of messages) addMessage(row.role, row.text || '', { label: row.label });
    }

    function renderThreads() {
      els.threadList.textContent = '';
      if (!state.threads.length) {
        const row = document.createElement('div');
        row.className = 'thread-meta';
        row.style.padding = '10px';
        row.textContent = '暂未从 VSCode GUI 读取到任务';
        els.threadList.appendChild(row);
      }
      for (const item of state.threads) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `thread-item${item.id === state.selectedThreadId ? ' is-current' : ''}`;
        const title = document.createElement('div');
        title.className = 'thread-title';
        title.textContent = threadTitle(item);
        const meta = document.createElement('div');
        meta.className = 'thread-meta';
        meta.textContent = `${item.projectName || 'VSCode Codex'}${item.updatedAtText ? ` · ${item.updatedAtText}` : ''}`;
        button.append(title, meta);
        button.addEventListener('click', () => selectThread(item.id));
        els.threadList.appendChild(button);
      }
      const current = currentThread();
      els.currentTitle.textContent = current ? threadTitle(current) : '当前会话';
    }

    async function loadThreads(options = {}) {
      const data = await apiJson('/codex/threads?limit=120', { timeout: 20000 });
      state.threads = data.threads || [];
      if (state.selectedThreadId && !state.threads.some(item => item.id === state.selectedThreadId)) {
        setSelectedThreadId('');
      }
      renderThreads();
      if (options.loadSelected === true && state.selectedThreadId) await selectThread(state.selectedThreadId);
    }

    async function loadHistory() {
      clearChat();
      const loading = addMessage('assistant', '正在从 VSCode Codex GUI 读取当前会话…', { label: 'Codex Max' });
      try {
        const data = await apiJson('/codex/history?limit=120', { timeout: 45000 });
        loading.wrap.remove();
        if (data.view === 'thread-list') {
          renderMessages([]);
          if (data.message) showNotice(data.message);
          return;
        }
        renderMessages(data.messages || []);
        if (data.title) els.currentTitle.textContent = data.title;
        state.currentSignature = statusSignature(data);
        await resumeThreadStatus();
      } catch (error) {
        loading.wrap.remove();
        addMessage('assistant', error.message || '读取 VSCode GUI 会话失败。', { label: 'Codex Max' });
      }
    }

    async function selectThread(threadId) {
      if (!threadId || state.busy) return;
      setSelectedThreadId(threadId);
      document.body.classList.remove('menu-open');
      renderThreads();
      setBusy(true);
      try {
        const data = await apiJson('/codex/select', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ threadId }),
          timeout: 30000,
        });
        if (data.history?.messages) {
          renderMessages(data.history.messages);
          state.currentSignature = statusSignature(data.history);
          if (data.history.title) els.currentTitle.textContent = data.history.title;
        } else {
          await loadHistory();
        }
        showNotice('已在 VSCode Codex 中打开目标会话。');
      } catch (error) {
        showNotice(error.message || '打开 VSCode Codex 会话失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    function renderModelOptions() {
      els.modelSelect.textContent = '';
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = state.modelOptions.length ? '模型' : '模型';
      els.modelSelect.appendChild(placeholder);
      for (const item of state.modelOptions) {
        const option = document.createElement('option');
        option.value = item.key || item.id;
        option.textContent = item.label || item.displayName || item.id;
        els.modelSelect.appendChild(option);
      }
    }

    async function loadConfig() {
      const data = await apiJson('/codex/config', { timeout: 8000 });
      state.modelOptions = data.modelOptions || [];
      renderModelOptions();
    }

    async function refreshHealth() {
      try {
        const data = await apiJson(`/codex/health?t=${Date.now()}`, { timeout: 8000 });
        setStatus(data.controlMode);
      } catch {
        setStatus('unavailable');
      }
    }

    async function newThread() {
      setBusy(true);
      showNotice('正在新建 VSCode Codex 会话…');
      try {
        const data = await apiJson('/codex/new-thread', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({}),
          timeout: 25000,
        });
        setSelectedThreadId('');
        clearChat();
        addMessage('assistant', '新会话已在 VSCode Codex 打开。', { label: 'Codex Max' });
        showNotice(data.message || '已新建会话，左侧列表可手动刷新。');
      } catch (error) {
        showNotice(error.message || '新建会话失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    function beginPolling(watch) {
      stopPolling(false);
      state.activeWatch = watch || { since: new Date().toISOString(), threadId: state.selectedThreadId };
      setRunning(true);
      pollStatus();
      state.pollTimer = setInterval(pollStatus, 1400);
    }

    function stopPolling(update = true) {
      if (state.pollTimer) clearInterval(state.pollTimer);
      state.pollTimer = null;
      state.activeWatch = null;
      if (update) setRunning(false);
    }

    async function pollStatus() {
      if (!state.activeAssistant || !state.activeWatch) return stopPolling();
      try {
        const data = await apiJson('/codex/status', { timeout: 16000 });
        if (data.threadId && !state.selectedThreadId && isSelectableThreadId(data.threadId) && state.threads.some(item => item.id === data.threadId)) {
          setSelectedThreadId(data.threadId);
          renderThreads();
        }
        if (data.available) {
          state.currentSignature = statusSignature(data);
          const text = data.status === 'error'
            ? (data.error || data.preview || '回复失败。')
            : (data.preview || data.final || 'Codex 正在回复…');
          state.activeAssistant.bubble.textContent = text;
          els.chat.scrollTop = els.chat.scrollHeight;
          if (data.status === 'complete' || data.status === 'error' || (!data.active && data.final)) {
            state.activeAssistant.wrap.classList.remove('pending');
            state.activeAssistant.meta.textContent = data.status === 'error' ? 'Codex · 失败' : 'Codex';
            state.activeAssistant = null;
            stopPolling();
            await loadHistory().catch(() => {});
          }
        }
      } catch (error) {
        showNotice(error.message || '读取回复状态失败。', 'error');
      }
    }

    async function sendMessage() {
      const text = els.textarea.value.trim();
      if (!text && !state.attachments.length) return;
      if (state.activeAssistant) {
        await stopCurrentResponse();
        return;
      }
      const attachments = state.attachments.map(item => ({ ...item }));
      setBusy(true);
      if (text) addMessage('user', text, { label: '你' });
      if (attachments.length) addMessage('user', attachments.map(item => `附件：${item.name}`).join('\n'), { label: '你' });
      const assistant = addMessage('assistant', '已发送，等待 Codex 回复…', { label: 'Codex · 运行中', pending: true });
      state.activeAssistant = assistant;
      setRunning(true);
      els.textarea.value = '';
      autosize();
      try {
        const data = await apiJson('/send', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            clientRequestId: `send-${Date.now()}-${Math.random().toString(36).slice(2)}`,
            text,
            threadId: selectedGuiThreadId(),
            attachments,
          }),
          timeout: 65000,
        });
        if (data.threadId && !state.selectedThreadId && isSelectableThreadId(data.threadId) && state.threads.some(item => item.id === data.threadId)) {
          setSelectedThreadId(data.threadId);
          renderThreads();
        }
        clearAttachments();
        beginPolling(data.watch || { since: new Date().toISOString(), threadId: selectedGuiThreadId() });
      } catch (error) {
        assistant.wrap.classList.remove('pending');
        assistant.bubble.textContent = error.message || '发送失败。';
        state.activeAssistant = null;
        stopPolling();
        showNotice(error.message || '发送失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    async function stopCurrentResponse() {
      if (!state.activeAssistant) return;
      setBusy(true);
      try {
        const data = await apiJson('/codex/stop', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ threadId: state.activeWatch?.threadId || selectedGuiThreadId() }),
          timeout: 16000,
        });
        state.activeAssistant.wrap.classList.remove('pending');
        state.activeAssistant.meta.textContent = 'Codex · 已取消';
        state.activeAssistant.bubble.textContent = '已取消当前回复。';
        state.activeAssistant = null;
        stopPolling();
        showNotice(data.message || '已发送停止指令。');
      } catch (error) {
        showNotice(error.message || '停止失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    async function resumeThreadStatus() {
      try {
        const data = await apiJson('/codex/status', { timeout: 16000 });
        if (!data.available) return;
        state.currentSignature = statusSignature(data);
        if (data.model?.id) {
          const value = state.modelOptions.find(item => item.id === data.model.id || item.key === data.model.id)?.key || '';
          if (value) els.modelSelect.value = value;
        }
        if (data.reasoningMode?.key) els.reasoningSelect.value = data.reasoningMode.key;
        if (data.active || data.status === 'running') {
          const assistant = addMessage('assistant', data.preview || 'Codex 正在回复…', { label: 'Codex · 运行中', pending: true });
          state.activeAssistant = assistant;
          beginPolling({ since: data.startedAt || '', threadId: data.threadId || selectedGuiThreadId() });
        }
      } catch {}
    }

    async function refreshFromVscode() {
      if (document.hidden || state.activeAssistant || state.busy) return;
      try {
        const data = await apiJson('/codex/status', { timeout: 16000 });
        const signature = statusSignature(data);
        if (data.threadId && isSelectableThreadId(data.threadId) && state.threads.some(item => item.id === data.threadId) && data.threadId !== state.selectedThreadId) {
          setSelectedThreadId(data.threadId);
          renderThreads();
        }
        if (data.available && signature && state.currentSignature && signature !== state.currentSignature) {
          if (!data.threadId && state.selectedThreadId) {
            setSelectedThreadId('');
            renderThreads();
          }
          renderMessages(data.messages || []);
          if (data.title) els.currentTitle.textContent = data.title;
          state.currentSignature = signature;
          showNotice('已同步 VSCode Codex 当前 GUI。');
        } else if (data.available && !state.currentSignature) {
          state.currentSignature = signature;
        }
      } catch {}
    }

    async function switchModel() {
      const target = els.modelSelect.value;
      if (!target) return;
      setBusy(true);
      try {
        const data = await apiJson('/codex/model-switch', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ threadId: selectedGuiThreadId(), target }),
          timeout: 50000,
        });
        showNotice(data.message || '已切换模型。');
      } catch (error) {
        showNotice(error.message || '切换模型失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    async function switchReasoning() {
      const target = els.reasoningSelect.value;
      if (!target) return;
      setBusy(true);
      try {
        const data = await apiJson('/codex/reasoning-mode', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ threadId: selectedGuiThreadId(), target }),
          timeout: 50000,
        });
        showNotice(data.message || '已切换推理强度。');
      } catch (error) {
        showNotice(error.message || '切换推理强度失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    function autosize() {
      els.textarea.style.height = 'auto';
      els.textarea.style.height = Math.min(els.textarea.scrollHeight, 160) + 'px';
    }

    els.menu.addEventListener('click', () => document.body.classList.toggle('menu-open'));
    els.refresh.addEventListener('click', async () => {
      await refreshHealth();
      await loadThreads({ loadSelected: false }).catch(error => showNotice(error.message || '刷新会话失败。', 'error'));
      showNotice('已刷新。');
    });
    els.newThread.addEventListener('click', newThread);
    els.modelSelect.addEventListener('change', switchModel);
    els.reasoningSelect.addEventListener('change', switchReasoning);
    els.attach.addEventListener('click', () => els.fileInput.click());
    els.fileInput.addEventListener('change', event => {
      addFiles(event.target.files).catch(error => showNotice(error.message || '添加附件失败。', 'error'));
      event.target.value = '';
    });
    els.composer.addEventListener('submit', event => {
      event.preventDefault();
      if (state.activeAssistant) stopCurrentResponse();
      else sendMessage();
    });
    els.textarea.addEventListener('input', autosize);
    els.textarea.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
        event.preventDefault();
        if (state.activeAssistant) stopCurrentResponse();
        else sendMessage();
      }
    });

    async function boot() {
      setBusy(true);
      setRunning(false);
      try {
        await loadConfig();
        await refreshHealth();
        await loadThreads().catch(error => showNotice(error.message || '请先从启动器启动 VSCode。', 'error'));
        setInterval(refreshHealth, 8000);
        setInterval(refreshFromVscode, 3500);
      } catch (error) {
        showNotice(error.message || '启动 WebUI 失败。', 'error');
      } finally {
        setBusy(false);
      }
    }

    boot();
  </script>
</body>
</html>
